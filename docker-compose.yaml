x-backend-image: &backend-image pokemon-battle-inference-backend:local

x-postgres-settings:
  database: &postgres-database pokemon_battle_inference
  user: &postgres-user pokeop
  password: &postgres-password pokemon-battle-inference-local-only

x-postgres-client-environment: &postgres-client-environment
  PGHOST: postgres
  PGPORT: "5432"
  PGDATABASE: *postgres-database
  PGUSER: *postgres-user
  PGPASSWORD: *postgres-password

services:
  frontend:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "41100:80"
    networks:
      - default

  backend:
    image: *backend-image
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *postgres-client-environment
      PGAPPNAME: pokemon-battle-inference
    command: ["uvicorn", "pokeop.main:app", "--host", "0.0.0.0", "--port", "41104"]
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:41104/healthz', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "41104:41104"
    networks:
      - default

  db-init:
    image: *backend-image
    profiles: ["ops"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *postgres-client-environment
      PGAPPNAME: pokemon-battle-inference-db-init
    command: ["python3", "-m", "pokeop.persistence.commands.initialize_database"]
    networks:
      - default

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: *postgres-database
      POSTGRES_USER: *postgres-user
      POSTGRES_PASSWORD: *postgres-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "41132:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default

networks:
  default:

volumes:
  postgres_data:
