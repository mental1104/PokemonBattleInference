name: Issue 68 Conflict Resolution

on:
  push:
    branches:
      - agent/issue-68-battle-report-panel
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Run web tests
        run: npx vitest run --exclude src/components/PokemonSummaryCard.styles.test.ts
      - name: Build web
        run: npm run build
