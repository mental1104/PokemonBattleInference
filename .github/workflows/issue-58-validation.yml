name: Issue 58 Validation

on:
  push:
    branches:
      - agent/issue-58-transition-projection
  pull_request:
    branches:
      - main
    types:
      - synchronize
      - reopened
      - ready_for_review

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run projection and dependency tests
        run: |
          pytest tests/application/test_state_graph_projection.py
          pytest tests/application/test_state_graph_exploration.py tests/domain/battle/test_transitions.py tests/domain/battle/test_battle_events.py
