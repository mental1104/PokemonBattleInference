name: Run issue 52 implementation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  implement:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Execute guarded repository patch
        shell: bash
        run: |
          set +e
          python3 - <<'EXTRACT' > /tmp/issue-52-extract.log 2>&1
          from pathlib import Path

          workflow = Path('.github/workflows/issue-52-bootstrap.yml').read_text(
              encoding='utf-8'
          )
          start_marker = "          python3 - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = workflow.index(start_marker) + len(start_marker)
          end = workflow.index(end_marker, start)
          source = workflow[start:end]
          source = ''.join(
              line[10:] if line.startswith('          ') else line
              for line in source.splitlines(keepends=True)
          )
          Path('/tmp/issue-52-patch.py').write_text(source, encoding='utf-8')
          EXTRACT
          extract_status=$?
          if [[ $extract_status -ne 0 ]]; then
            cp /tmp/issue-52-extract.log issue52-bootstrap-error.txt
            echo "extract_status=$extract_status" >> issue52-bootstrap-error.txt
            echo "$extract_status" > /tmp/issue-52-status
            exit 0
          fi
          python3 /tmp/issue-52-patch.py > /tmp/issue-52-patch.log 2>&1
          patch_status=$?
          if [[ $patch_status -ne 0 ]]; then
            cp /tmp/issue-52-patch.log issue52-bootstrap-error.txt
            echo "patch_status=$patch_status" >> issue52-bootstrap-error.txt
          fi
          echo "$patch_status" > /tmp/issue-52-status
          exit 0

      - name: Persist bootstrap failure
        if: always()
        shell: bash
        run: |
          status=$(cat /tmp/issue-52-status 2>/dev/null || echo 1)
          if [[ "$status" == "0" ]]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add issue52-bootstrap-error.txt
          git commit -m "Record issue 52 bootstrap failure"
          git push origin HEAD:${{ github.head_ref }}
          cat issue52-bootstrap-error.txt
          exit "$status"

      - name: Validate Python contract
        shell: bash
        run: |
          python3 -m compileall -q \
            pokeop/application/use_cases/infer_one_on_one_battle.py \
            pokeop/api/schemas/inference.py \
            tests/application/use_cases/test_infer_one_on_one_battle.py \
            tests/api/test_inference_schema.py
          python3 -m pip install --disable-pip-version-check -r requirements.txt
          pytest -q \
            tests/application/use_cases/test_infer_one_on_one_battle.py \
            tests/api/test_inference_schema.py

      - name: Validate frontend contract
        shell: bash
        working-directory: web
        run: |
          npm ci
          npm run type-check
          npm test -- BattleInferenceView.test.ts

      - name: Commit implementation and remove temporary files
        shell: bash
        run: |
          rm .github/workflows/issue-52-bootstrap.yml
          rm .github/workflows/issue-52-pr-runner.yml
          rm -f issue52-bootstrap-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Freeze summary and exploration response contract"
          git push origin HEAD:${{ github.head_ref }}
