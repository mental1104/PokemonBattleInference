name: Validate issue 52 implementation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Validate Python contract
        shell: bash
        run: |
          python3 -m compileall -q \
            pokeop/application/use_cases/infer_one_on_one_battle.py \
            pokeop/api/schemas/inference.py \
            tests/application/use_cases/test_infer_one_on_one_battle.py \
            tests/api/test_inference_schema.py
          python3 -m pip install --disable-pip-version-check -r requirements.txt
          pytest -q \
            tests/application/use_cases/test_infer_one_on_one_battle.py \
            tests/api/test_inference_schema.py

      - name: Validate frontend contract
        shell: bash
        working-directory: web
        run: |
          npm ci
          npm run type-check
          npm test -- BattleInferenceView.test.ts

      - name: Remove temporary validation files
        shell: bash
        run: |
          rm .github/workflows/issue-52-pr-runner.yml
          rm -f issue52-bootstrap-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove issue 52 validation bootstrap"
          git push origin HEAD:${{ github.head_ref }}
