name: Issue 64 exploration API validation

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  targeted-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialize shared common submodule only
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git submodule update --init submodules/common

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile changed Python modules
        run: |
          python -m py_compile \
            pokeop/api/routers/inference.py \
            pokeop/api/schemas/battle_exploration.py \
            pokeop/application/use_cases/store_battle_graph.py \
            pokeop/main.py \
            tests/api/test_battle_exploration_router.py

      - name: Run targeted tests
        run: |
          pytest -q \
            tests/application/use_cases/test_store_battle_graph.py \
            tests/infrastructure/test_battle_graph_store.py \
            tests/api/test_inference_schema.py \
            tests/api/test_inference_router.py \
            tests/api/test_battle_exploration_router.py
