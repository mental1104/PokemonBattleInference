name: Issue 56 validation

on:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]

jobs:
  domain-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - name: Prepare pinned version group CSV fixture
        run: |
          mkdir -p submodules/pokeapi/data/v2/csv
          curl --fail --location --silent --show-error \
            https://raw.githubusercontent.com/PokeAPI/pokeapi/master/data/v2/csv/version_groups.csv \
            --output /tmp/version_groups.csv
          head -n 32 /tmp/version_groups.csv \
            > submodules/pokeapi/data/v2/csv/version_groups.csv
      - run: python -m compileall -q pokeop tests
      - run: pytest -q tests/domain/battle/test_battle_events.py
      - name: Run battle domain tests
        id: battle-tests
        continue-on-error: true
        run: pytest -q tests/domain/battle > pytest-domain-battle.log 2>&1
      - name: Upload battle domain test log
        uses: actions/upload-artifact@v4
        with:
          name: pytest-domain-battle-log
          path: pytest-domain-battle.log
      - name: Fail when battle domain tests failed
        if: steps.battle-tests.outcome == 'failure'
        run: exit 1
