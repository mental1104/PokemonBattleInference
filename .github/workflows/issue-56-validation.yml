name: Issue 56 validation

on:
  pull_request:
    types: [synchronize, opened, reopened, ready_for_review]

jobs:
  domain-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - run: python -m compileall -q pokeop tests
      - run: pytest -q tests/domain/battle/test_battle_events.py
      - run: pytest -q tests/domain/battle
