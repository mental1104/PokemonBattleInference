name: Router Fix Validation

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile changed Python sources
        run: python -m compileall -q pokeop/api/routers/inference.py tests/api/test_inference_router.py
      - name: Run router regression tests
        run: python -m pytest -q tests/api/test_inference_router.py
      - name: Verify registered route
        run: |
          python - <<'PY'
          from pokeop.main import create_app

          application = create_app()
          route = next(
              item
              for item in application.routes
              if item.path == "/v1/inference/dragonite-vs-weavile"
          )
          assert "POST" in route.methods
          print(route.path, sorted(route.methods))
          PY
