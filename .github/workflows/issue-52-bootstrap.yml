          def test_response_separates_global_summary_from_exploration_entry() -> None:
              """验证代表路径只属于 summary，完整图 artifact 不会泄漏到 HTTP JSON。

              顶层必须只有 ``summary`` 与 ``exploration``。胜负概率、图统计和代表路径来自
              完整求解结果；exploration 只暴露根节点、可选 graph ID、计算版本与可展开状态，
              因而代表路径不能被误当成用户当前选择路径或后续节点查询入口。
              """
              payload = battle_inference_journey_response(_result()).model_dump()

              assert set(payload) == {"summary", "exploration"}
              assert payload["summary"]["win_probability"]["numerator"] == 3
              assert payload["summary"]["loss_probability"]["numerator"] == 1
              assert payload["summary"]["graph"]["unique_state_count"] == 2
              assert payload["summary"]["representative_paths"][0]["reference"] == (
                  "path:attacker-win:node-1"
              )
              assert "representative_paths" not in payload["exploration"]
              assert "graph_artifact" not in payload["exploration"]
              assert payload["exploration"] == {
                  "root_node_id": 0,
                  "graph_id": None,
                  "calculation_revision": BATTLE_INFERENCE_CALCULATION_REVISION,
                  "expandable": True,
              }
          ''',
              encoding="utf-8",
          )

          frontend_api_path = Path("web/src/api/inference.ts")
          frontend_api_path.write_text(
              '''const API_BASE_URL = import.meta.env.VITE_API_BASE_URL ?? '/api/v1';

          export type DragoniteAbility = 'multiscale' | 'inner-focus';
          export type WeavilePlan = 'ice-punch' | 'fake-out-pressure';

          export interface BattleJourneyRequest {
            dragonite_ability: DragoniteAbility;
            weavile_plan: WeavilePlan;
            dragonite_stat_preset: string;
            weavile_stat_preset: string;
          }

          export interface ProbabilityResult {
            numerator: number;
            denominator: number;
            decimal: number;
            percent: number;
          }

          export interface ExpectedTurnsResult {
            available: boolean;
            numerator: number | null;
            denominator: number | null;
            decimal: number | null;
          }

          export interface PokemonConfigurationResult {
            pokemon_id: number;
            name: string;
            level: number;
            ability_identifier: string;
            item_identifier: string;
            move_ids: number[];
            move_names: string[];
            stats: Record<string, number>;
            dimension_labels: Record<string, string>;
          }

          export interface GraphSummaryResult {
            unique_state_count: number;
            edge_count: number;
            max_turn_number: number;
            closed_cycle_count: number;
            terminal_reachable_cycle_count: number;
            is_complete: boolean;
            truncation_reasons: string[];
          }

          export interface RepresentativePathStepResult {
            node_id: number;
            turn_number: number;
            phase: string;
            attacker_hp: number;
            defender_hp: number;
            outcome: string;
            events: string[];
          }

          export interface RepresentativePathResult {
            reference: string;
            outcome: string;
            steps: RepresentativePathStepResult[];
          }

          export interface BattleInferenceCompletenessResult {
            graph_complete: boolean;
            solver_status: string;
            truncation_reasons: string[];
            diagnostics: string[];
            warnings: string[];
          }

          export interface BattleInferenceSummaryResult {
            ruleset_id: string;
            version_group_id: number;
            observer: string;
            attacker: PokemonConfigurationResult;
            defender: PokemonConfigurationResult;
            win_probability: ProbabilityResult;
            loss_probability: ProbabilityResult;
            draw_probability: ProbabilityResult;
            expected_turns: ExpectedTurnsResult;
            attacker_policy: string;
            defender_policy: string;
            graph: GraphSummaryResult;
            representative_paths: RepresentativePathResult[];
            included_mechanisms: string[];
            excluded_mechanisms: string[];
            configuration_coverage_percent: number;
            completeness: BattleInferenceCompletenessResult;
          }

          export interface BattleExplorationResult {
            root_node_id: number;
            graph_id: string | null;
            calculation_revision: string;
            expandable: boolean;
          }

          export interface BattleJourneyResult {
            summary: BattleInferenceSummaryResult;
            exploration: BattleExplorationResult;
          }

          /**
           * 读取 FastAPI JSON 响应，并把 detail 错误转换为用户可读异常。
           *
           * @param path 相对于 `/api/v1` 的接口路径。
           * @param init fetch 请求参数。
           * @returns 通过泛型声明的 JSON 响应。
           */
          async function requestJson<T>(path: string, init: RequestInit): Promise<T> {
            const response = await fetch(`${API_BASE_URL}${path}`, init);
            const payload = (await response.json()) as T & { detail?: string };
            if (!response.ok) {
              throw new Error(payload.detail ?? `请求失败：HTTP ${response.status}`);
            }
            return payload;
          }

          /**
           * 执行快龙 vs 玛纽拉的受控多回合推演。
           *
           * @param request 页面选择的快龙特性、玛纽拉方案和能力预设。
           * @returns 分离全局 summary 与渐进 exploration 入口的顶层结果。
           */
          export async function inferDragoniteVsWeavile(
            request: BattleJourneyRequest,
          ): Promise<BattleJourneyResult> {
            return requestJson<BattleJourneyResult>('/inference/dragonite-vs-weavile', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify(request),
            });
          }
          ''',
              encoding="utf-8",
          )

          view_path = Path("web/src/views/BattleInferenceView.vue")
          view_text = view_path.read_text(encoding="utf-8")
          result_anchor = "const result = ref<BattleJourneyResult | null>(null);\n"
          result_replacement = (
              "const result = ref<BattleJourneyResult | null>(null);\n"
              "const summary = computed(() => result.value?.summary ?? null);\n"
          )
          if view_text.count(result_anchor) != 1:
              raise RuntimeError("battle inference view result state changed")
          view_text = view_text.replace(result_anchor, result_replacement, 1)
          script, template = view_text.split("<template>", 1)
          template = template.replace('<template v-if="result">', '<template v-if="summary">')
          template = template.replace("result.", "summary.")
          template = template.replace(
              "summary.solver_status", "summary.completeness.solver_status"
          )
          template = template.replace(
              "summary.warnings", "summary.completeness.warnings"
          )
          view_path.write_text(script + "<template>" + template, encoding="utf-8")

          view_test_path = Path("web/src/views/BattleInferenceView.test.ts")
          view_test_text = view_test_path.read_text(encoding="utf-8")
          object_start = "const RESULT: BattleJourneyResult = {\n"
          old_tail = '''  configuration_coverage_percent: 100,
            solver_status: 'solved',
            warnings: ['未纳入机制：ability:pressure:real_ability_behavior'],
          };'''
          if view_test_text.count(object_start) != 1 or view_test_text.count(old_tail) != 1:
              raise RuntimeError("battle inference view fixture changed")
          prefix, remainder = view_test_text.split(object_start, 1)
          body, suffix = remainder.split(old_tail, 1)
          indented_body = "".join(
              f"  {line}" if line.strip() else line
              for line in body.splitlines(keepends=True)
          )
          new_fixture = (
              object_start
              + "  summary: {\n"
              + indented_body
              + "    configuration_coverage_percent: 100,\n"
              + "    completeness: {\n"
              + "      graph_complete: true,\n"
              + "      solver_status: 'solved',\n"
              + "      truncation_reasons: [],\n"
              + "      diagnostics: [],\n"
              + "      warnings: ['未纳入机制：ability:pressure:real_ability_behavior'],\n"
              + "    },\n"
              + "  },\n"
              + "  exploration: {\n"
              + "    root_node_id: 0,\n"
              + "    graph_id: null,\n"
              + "    calculation_revision: 'battle-inference.summary-exploration.v1',\n"
              + "    expandable: true,\n"
              + "  },\n"
              + "};"
          )
          view_test_path.write_text(prefix + new_fixture + suffix, encoding="utf-8")
          PY

      - name: Validate Python contract
        shell: bash
        run: |
          python3 -m compileall -q \
            pokeop/application/use_cases/infer_one_on_one_battle.py \
            pokeop/api/schemas/inference.py \
            tests/application/use_cases/test_infer_one_on_one_battle.py \
            tests/api/test_inference_schema.py
          python3 -m pip install --disable-pip-version-check -r requirements.txt
          pytest -q \
            tests/application/use_cases/test_infer_one_on_one_battle.py \
            tests/api/test_inference_schema.py

      - name: Validate frontend contract
        shell: bash
        working-directory: web
        run: |
          npm ci
          npm run type-check
          npm test -- BattleInferenceView.test.ts

      - name: Commit implementation and remove bootstrap workflow
        shell: bash
        run: |
          rm .github/workflows/issue-52-bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Freeze summary and exploration response contract"
          git push origin HEAD:agent/issue-52-summary-exploration-contract
