name: Issue 56 application wiring

on:
  push:
    branches: [agent/structured-battle-events]

permissions:
  contents: write

jobs:
  wire-application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/structured-battle-events
          fetch-depth: 0
      - name: Wire structured resolver into application use case
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("pokeop/application/use_cases/infer_one_on_one_battle.py")
          content = path.read_text(encoding="utf-8")
          replacements = {
              "from pokeop.domain.battle.move_execution import StandardMoveTurnResolver": (
                  "from pokeop.domain.battle.structured_turn_resolver import (\n"
                  "    BattleEventStandardMoveTurnResolver,\n"
                  ")"
              ),
              "turn_resolver: StandardMoveTurnResolver": (
                  "turn_resolver: BattleEventStandardMoveTurnResolver"
              ),
              "turn_resolver=StandardMoveTurnResolver(effects=effects)": (
                  "turn_resolver=BattleEventStandardMoveTurnResolver(effects=effects)"
              ),
              "可直接注入 StandardMoveTurnResolver 的同规则集 effect 元组。": (
                  "可直接注入 BattleEventStandardMoveTurnResolver 的同规则集 effect 元组。"
              ),
          }
          changed = False
          for old, new in replacements.items():
              count = content.count(old)
              if count == 1:
                  content = content.replace(old, new)
                  changed = True
              elif count != 0:
                  raise SystemExit(f"unexpected occurrence count for {old!r}: {count}")
          if changed:
              path.write_text(content, encoding="utf-8")
          PY
      - name: Commit application wiring
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pokeop/application/use_cases/infer_one_on_one_battle.py
          git commit -m "feat(application): 接入结构化 BattleEvent 回合解析"
          git push origin HEAD:agent/structured-battle-events
