name: Issue 33 Validation

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile Python sources
        run: python -m compileall -q pokeop tests
      - name: Capture issue 33 backend tests
        run: |
          set +e
          python -m pytest -q \
            tests/application/use_cases/test_infer_one_on_one_battle.py \
            tests/application/composition/test_battle_inference_repository.py \
            tests/api/test_inference_router.py \
            > issue33-backend.log 2>&1
          echo "$?" > issue33-backend.status
      - name: Upload backend validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue33-backend-log
          path: |
            issue33-backend.log
            issue33-backend.status
      - name: Assert backend tests passed
        run: |
          cat issue33-backend.log
          test "$(cat issue33-backend.status)" = "0"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Type-check and build frontend
        run: npm run build
      - name: Capture frontend tests
        run: |
          set +e
          npm test -- src/App.test.ts src/views/BattleInferenceView.test.ts \
            > issue33-frontend.log 2>&1
          echo "$?" > issue33-frontend.status
      - name: Upload frontend validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue33-frontend-log
          path: |
            web/issue33-frontend.log
            web/issue33-frontend.status
      - name: Assert frontend tests passed
        run: |
          cat issue33-frontend.log
          test "$(cat issue33-frontend.status)" = "0"
