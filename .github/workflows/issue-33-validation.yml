name: Issue 33 Validation

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile Python sources
        run: python -m compileall -q pokeop tests
      - name: Run issue 33 backend tests
        run: >-
          python -m pytest -q
          tests/application/use_cases/test_infer_one_on_one_battle.py
          tests/application/composition/test_battle_inference_repository.py
          tests/api/test_inference_router.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Type-check and build frontend
        run: npm run build
      - name: Run frontend tests
        run: npm test -- src/App.test.ts src/views/BattleInferenceView.test.ts
