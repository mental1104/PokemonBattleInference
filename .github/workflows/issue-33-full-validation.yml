name: Issue 33 Full Validation

on:
  pull_request:
    types: [synchronize]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install -r requirements.txt
      - name: Compile Python sources
        run: python -m compileall -q pokeop tests
      - name: Capture full backend tests
        run: |
          set +e
          python -m pytest -q > issue33-full-backend.log 2>&1
          echo "$?" > issue33-full-backend.status
      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue33-full-backend-log
          path: |
            issue33-full-backend.log
            issue33-full-backend.status
      - name: Assert full backend tests passed
        run: |
          tail -n 200 issue33-full-backend.log
          test "$(cat issue33-full-backend.status)" = "0"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Type-check and build frontend
        run: npm run build
      - name: Capture full frontend tests
        run: |
          set +e
          npm test > issue33-full-frontend.log 2>&1
          echo "$?" > issue33-full-frontend.status
      - name: Upload frontend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue33-full-frontend-log
          path: |
            web/issue33-full-frontend.log
            web/issue33-full-frontend.status
      - name: Assert full frontend tests passed
        run: |
          cat issue33-full-frontend.log
          test "$(cat issue33-full-frontend.status)" = "0"
