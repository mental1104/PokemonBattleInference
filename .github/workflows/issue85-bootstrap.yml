name: Issue 85 bootstrap

on:
  push:
    branches:
      - agent/issue-85-battle-inference-job-persistence

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/issue-85-battle-inference-job-persistence
          fetch-depth: 0

      - name: Apply verified implementation payload
        shell: bash
        run: |
          set -euo pipefail
          echo '0de5b970bf821eb0c62a300861293a96bea9c558999728e80da1e0315397e1f9  .issue85-payload.tar.xz' | sha256sum --check
          tar -xJf .issue85-payload.tar.xz
          rm -f .issue85-payload.tar.xz .github/workflows/issue85-bootstrap.yml
          python -m compileall -q pokeop scripts tests
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'feat: 持久化战斗推演后台任务与配置结果'
          git push origin HEAD:agent/issue-85-battle-inference-job-persistence
