name: Issue 62 Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - "pokeop/application/use_cases/battle_exploration/**"
      - "tests/application/use_cases/battle_exploration_test_helpers.py"
      - "tests/application/use_cases/test_battle_exploration_*.py"
      - ".github/workflows/issue-62-validation.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile application files
        run: |
          python -m compileall -q \
            pokeop/application/use_cases/battle_exploration \
            tests/application/use_cases/battle_exploration_test_helpers.py \
            tests/application/use_cases/test_battle_exploration_navigation.py \
            tests/application/use_cases/test_battle_exploration_report.py

      - name: Run issue 62 targeted tests
        run: |
          pytest -q \
            tests/application/test_state_graph_exploration.py \
            tests/application/test_state_graph_projection.py \
            tests/application/use_cases/test_store_battle_graph.py \
            tests/application/use_cases/test_battle_exploration_navigation.py \
            tests/application/use_cases/test_battle_exploration_report.py
